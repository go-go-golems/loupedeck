name: ci

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions:
  contents: read

jobs:
  test-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: generate assets
        run: GOWORK=off go generate ./...
      - name: run unit tests
        run: GOWORK=off go test ./...
      - name: build packages
        run: GOWORK=off go build ./...
      - name: smoke test shipped CLI help
        run: |
          GOWORK=off go run ./cmd/loupedeck --help
          GOWORK=off go run ./cmd/loupedeck run --help
