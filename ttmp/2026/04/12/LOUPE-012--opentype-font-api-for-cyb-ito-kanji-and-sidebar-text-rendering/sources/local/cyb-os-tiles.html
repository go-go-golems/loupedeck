<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const BS=90,COLS=4,ROWS=3,STRIP=36;
const TW=STRIP+COLS*BS+STRIP,TH=ROWS*BS;
const c=document.getElementById('c');
c.width=TW;c.height=TH;
c.style.width=TW*2+'px';c.style.height=TH*2+'px';
const ctx=c.getContext('2d');
const img=ctx.createImageData(TW,TH);
const d=img.data;
const ripples=[];
let frame=0,scrollOff=0;

const kanjiStream='電脳空間仮想現実神経接続量子演算暗号解読超伝導体結晶化人工知能深層学習機械翻訳自律制御情報処理回路接続侵入防止走査起動'.split('');

// ===== PIXEL HELPERS =====
function setP(x,y,v){
  x=x|0;y=y|0;
  if(x<0||x>=TW||y<0||y>=TH)return;
  const pi=(y*TW+x)*4;
  d[pi]=Math.min(255,d[pi]+v);d[pi+1]=Math.min(255,d[pi+1]+v);d[pi+2]=Math.min(255,d[pi+2]+v);
}

function lineH(x1,x2,y,v){for(let x=x1;x<=x2;x++)setP(x,y,v)}
function lineV(x,y1,y2,v){for(let y=y1;y<=y2;y++)setP(x,y,v)}

function drawRect(x,y,w,h,v){lineH(x,x+w-1,y,v);lineH(x,x+w-1,y+h-1,v);lineV(x,y,y+h-1,v);lineV(x+w-1,y,y+h-1,v)}

// text rasterizer
const _tc=document.createElement('canvas');_tc.width=90;_tc.height=20;
const _tctx=_tc.getContext('2d');
const _cache={};
function rTxt(text,font,size,w,h){
  const k=text+'|'+size+'|'+font+'|'+w;
  if(_cache[k])return _cache[k];
  _tc.width=w;_tc.height=h;
  _tctx.clearRect(0,0,w,h);_tctx.fillStyle='#fff';
  _tctx.font=size+'px '+font;_tctx.textAlign='center';_tctx.textBaseline='middle';
  _tctx.fillText(text,w/2,h/2);
  const dd=_tctx.getImageData(0,0,w,h).data;
  const out=new Uint8Array(w*h);
  for(let i=0;i<w*h;i++)out[i]=dd[i*4];
  _cache[k]={data:out,w,h};return _cache[k];
}

function drawText(text,font,size,px,py,brt,w,h){
  const t=rTxt(text,font,size,w||80,h||14);
  for(let ly=0;ly<t.h;ly++)for(let lx=0;lx<t.w;lx++){
    const v=t.data[ly*t.w+lx];
    if(v>25)setP(px+lx,py+ly,(v/255*brt)|0);
  }
}

// ===== TILE DEFINITIONS =====
const tiles=[
  // 0: CLOCK
  {title:'CLK',sub:'時計',
    draw(ox,oy,t,active){
      const d=new Date();
      const h=String(d.getHours()).padStart(2,'0');
      const m=String(d.getMinutes()).padStart(2,'0');
      const s=String(d.getSeconds()).padStart(2,'0');
      drawText(h+':'+m,'monospace',22,ox+8,oy+22,active?220:90,74,24);
      drawText(s,'monospace',12,ox+32,oy+48,active?140:40,26,14);
      // ticking dot
      if(d.getSeconds()%2===0)for(let dy=0;dy<3;dy++)for(let dx=0;dx<3;dx++)setP(ox+24+dx,oy+50+dy,active?180:60);
      // date kanji
      const days=['日','月','火','水','木','金','土'];
      drawText(days[d.getDay()]+'曜日','serif',11,ox+18,oy+66,active?100:25,54,14);
    }},

  // 1: CPU MONITOR
  {title:'CPU',sub:'処理',
    draw(ox,oy,t,active){
      const bars=8;
      for(let i=0;i<bars;i++){
        const level=Math.sin(t*2+i*0.8)*0.3+Math.sin(t*0.7+i*1.5)*0.3+0.5;
        const bh=(level*40)|0;
        const brt=active?160:(20+level*50|0);
        const bx=ox+8+i*10;
        for(let y=0;y<bh;y++){
          const py=oy+68-y;
          if((bx+py)%2===0)setP(bx,py,brt);
          if((bx+1+py)%2===0)setP(bx+1,py,brt);
        }
        // cap
        setP(bx,oy+68-bh,brt+20);setP(bx+1,oy+68-bh,brt+20);
      }
      // percentage
      const pct=((Math.sin(t*1.3)*30+50)|0)+'%';
      drawText(pct,'monospace',10,ox+22,oy+74,active?160:35,46,12);
    }},

  // 2: WAVEFORM
  {title:'WAVE',sub:'波形',
    draw(ox,oy,t,active){
      const w=76,h=50,bx=ox+7,by=oy+18;
      drawRect(bx,by,w,h,active?40:12);
      // grid
      for(let x=bx;x<bx+w;x+=12)lineV(x,by,by+h,4);
      for(let y=by;y<by+h;y+=10)lineH(bx,bx+w,y,4);
      // wave
      const brt=active?200:70;
      for(let x=0;x<w;x+=1){
        const val=Math.sin(x*0.12+t*3)*0.35+Math.sin(x*0.05+t*1.7)*0.25+Math.sin(x*0.3+t*5)*0.1;
        const py=(by+h/2+val*h*0.4)|0;
        setP(bx+x,py,brt);setP(bx+x,py+1,brt*0.4|0);
        // echo
        setP(bx+x,py+8,(brt*0.15)|0);
      }
    }},

  // 3: NEURAL NET
  {title:'NET',sub:'神経',nodes:null,
    draw(ox,oy,t,active){
      if(!this.nodes){
        this.nodes=[];this.edges=[];
        const layers=[3,5,4,2];let id=0;
        layers.forEach((cnt,li)=>{
          for(let i=0;i<cnt;i++){
            this.nodes.push({x:12+li*22,y:44-cnt*7+i*14+7,layer:li,pulse:0,id:id++});
          }
        });
        this.nodes.forEach(n=>{
          this.nodes.filter(m=>m.layer===n.layer+1).forEach(m=>{
            this.edges.push({a:n.id,b:m.id,w:Math.random(),fire:0});
          });
        });
      }
      // fire random edge
      if(frame%20===0||active){
        const e=this.edges[Math.floor(Math.random()*this.edges.length)];
        e.fire=1;this.nodes[e.b].pulse=1;
      }
      // draw edges
      this.edges.forEach(e=>{
        const a=this.nodes[e.a],b=this.nodes[e.b];
        const brt=e.fire>0?(active?180:80):(active?18:6);
        const dx=b.x-a.x,dy=b.y-a.y;
        const steps=Math.max(Math.abs(dx),Math.abs(dy));
        for(let s=0;s<=steps;s++){
          setP(ox+a.x+(dx*s/steps)|0,oy+a.y+(dy*s/steps)|0,brt);
        }
        if(e.fire>0)e.fire-=0.04;
      });
      // draw nodes
      this.nodes.forEach(n=>{
        const brt=n.pulse>0?(active?255:120):(active?40:15);
        const s=n.pulse>0?2:1;
        for(let dy=-s;dy<=s;dy++)for(let dx=-s;dx<=s;dx++)setP(ox+n.x+dx,oy+n.y+dy,brt);
        if(n.pulse>0)n.pulse-=0.03;
      });
    }},

  // 4: MEMORY MAP
  {title:'MEM',sub:'記憶',grid:null,
    draw(ox,oy,t,active){
      if(!this.grid){this.grid=new Uint8Array(8*8);for(let i=0;i<64;i++)this.grid[i]=Math.random()>0.5?1:0;}
      if(frame%15===0){const i=Math.floor(Math.random()*64);this.grid[i]=this.grid[i]?0:1;}
      const cs=8,gap=1,bx=ox+9,by=oy+18;
      for(let r=0;r<8;r++)for(let cl=0;cl<8;cl++){
        const on=this.grid[r*8+cl];
        const brt=on?(active?160:45):(active?12:4);
        const px=bx+cl*(cs+gap),py=by+r*(cs+gap);
        for(let dy=0;dy<cs;dy++)for(let dx=0;dx<cs;dx++){
          if(on||(dx===0||dy===0||dx===cs-1||dy===cs-1))setP(px+dx,py+dy,on?brt:(brt));
          else setP(px+dx,py+dy,2);
        }
      }
      const used=this.grid.reduce((a,b)=>a+b,0);
      drawText(((used/64*100)|0)+'%','monospace',9,ox+28,oy+76,active?120:30,34,12);
    }},

  // 5: TERMINAL
  {title:'TERM',sub:'端末',lines:['> boot_seq OK','> neural.init','> 全回路接続','> scan: 7node','> ready_'],scroll:0,
    draw(ox,oy,t,active){
      // bg
      for(let y=oy+16;y<oy+82;y++)for(let x=ox+4;x<ox+86;x++)setP(x,y,active?6:2);
      // scroll lines
      if(frame%60===0){
        const msgs=['> ping OK','> 走査完了','> mem: 64K','> net: UP','> 暗号解読中','> node_7 ACK','> データ受信','> sys nominal'];
        this.lines.push(msgs[Math.floor(Math.random()*msgs.length)]);
        if(this.lines.length>8)this.lines.shift();
      }
      const brt=active?180:55;
      this.lines.forEach((line,i)=>{
        const ly=oy+20+i*8;
        if(ly>oy+78)return;
        drawText(line,'monospace',7,ox+4,ly,brt-(8-i)*3,82,9);
      });
      // cursor blink
      if(Math.sin(t*6)>0){
        for(let dy=0;dy<7;dy++)for(let dx=0;dx<5;dx++)setP(ox+8+dx,oy+20+this.lines.length*8+dy-8,active?180:50);
      }
    }},

  // 6: RADAR
  {title:'RADAR',sub:'探知',
    draw(ox,oy,t,active){
      const cx=ox+45,cy=oy+44,r=28;
      // rings
      for(let ri=10;ri<=r;ri+=9){
        let x=ri,y=0,err=1-ri;
        while(x>=y){
          const b=active?20:7;
          setP(cx+x,cy+y,b);setP(cx-x,cy+y,b);setP(cx+x,cy-y,b);setP(cx-x,cy-y,b);
          setP(cx+y,cy+x,b);setP(cx-y,cy+x,b);setP(cx+y,cy-x,b);setP(cx-y,cy-x,b);
          y++;if(err<0)err+=2*y+1;else{x--;err+=2*(y-x)+1;}
        }
      }
      // crosshair
      lineH(cx-r,cx+r,cy,active?15:5);lineV(cx,cy-r,cy+r,active?15:5);
      // sweep line
      const angle=t*1.5;
      const brt=active?200:80;
      for(let i=0;i<r;i++){
        const sx=(Math.cos(angle)*i)|0,sy=(Math.sin(angle)*i)|0;
        setP(cx+sx,cy+sy,brt);
        // trail
        for(let tr=1;tr<6;tr++){
          const ta=angle-tr*0.08;
          const tsx=(Math.cos(ta)*i)|0,tsy=(Math.sin(ta)*i)|0;
          setP(cx+tsx,cy+tsy,(brt*0.6/tr)|0);
        }
      }
      // blips
      const blips=[[12,-8],[-6,15],[-15,-5],[8,12]];
      blips.forEach(([bx,by])=>{
        const dist=Math.sqrt(bx*bx+by*by);
        const bAngle=Math.atan2(by,bx);
        let diff=((angle-bAngle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
        if(diff<0.5){
          const bb=((1-diff/0.5)*160)|0;
          setP(cx+bx,cy+by,bb);setP(cx+bx+1,cy+by,bb);setP(cx+bx,cy+by+1,bb);
        }else{
          setP(cx+bx,cy+by,active?25:8);
        }
      });
    }},

  // 7: SYSTEM LOG (scrolling kanji)
  {title:'LOG',sub:'記録',
    draw(ox,oy,t,active){
      const logKanji='警告注意正常異常起動停止接続切断送信受信解析完了'.split('');
      for(let i=0;i<5;i++){
        const yOff=((frame*0.3+i*16)%80)-10;
        const ci=(Math.floor(frame*0.02)+i)%logKanji.length;
        const fade=1-Math.abs(yOff-30)/40;
        if(fade<=0)continue;
        const brt=((active?140:40)*Math.max(0,fade))|0;
        drawText(logKanji[ci],'serif',18,ox+12,oy+16+(yOff|0),brt,20,20);
        // status dot
        const dotBrt=((active?100:25)*fade)|0;
        setP(ox+40,oy+24+(yOff|0),dotBrt);setP(ox+41,oy+24+(yOff|0),dotBrt);
        // hex
        const hex=((ci*17+frame)&0xFF).toString(16).toUpperCase().padStart(2,'0');
        drawText('0x'+hex,'monospace',7,ox+46,oy+20+(yOff|0),brt*0.5|0,36,9);
      }
    }},

  // 8: SIGNAL
  {title:'SIG',sub:'信号',
    draw(ox,oy,t,active){
      // antenna bars
      const barCount=6;
      for(let i=0;i<barCount;i++){
        const maxH=12+i*7;
        const level=Math.sin(t+i*0.4)*0.3+0.7;
        const h=(maxH*level)|0;
        const brt=active?160:(30+level*40|0);
        const bx=ox+12+i*12;
        for(let y=0;y<h;y++){
          const py=oy+70-y;
          for(let dx=0;dx<6;dx++){
            if(y<h-1)setP(bx+dx,py,brt);
            else{setP(bx+dx,py,brt+40);}
          }
        }
      }
      // dB readout
      const db=((Math.sin(t*1.5)*20-40)|0);
      drawText(db+'dB','monospace',8,ox+22,oy+76,active?140:30,46,10);
    }},

  // 9: DISK I/O
  {title:'DISK',sub:'記憶',angle:0,
    draw(ox,oy,t,active){
      const cx=ox+45,cy=oy+42,r=22;
      // outer ring
      let x=r,y=0,err=1-r;
      const rb=active?80:25;
      while(x>=y){
        setP(cx+x,cy+y,rb);setP(cx-x,cy+y,rb);setP(cx+x,cy-y,rb);setP(cx-x,cy-y,rb);
        setP(cx+y,cy+x,rb);setP(cx-y,cy+x,rb);setP(cx+y,cy-x,rb);setP(cx-y,cy-x,rb);
        y++;if(err<0)err+=2*y+1;else{x--;err+=2*(y-x)+1;}
      }
      // inner ring
      x=8;y=0;err=1-8;
      while(x>=y){
        setP(cx+x,cy+y,rb);setP(cx-x,cy+y,rb);setP(cx+x,cy-y,rb);setP(cx-x,cy-y,rb);
        setP(cx+y,cy+x,rb);setP(cx-y,cy+x,rb);setP(cx+y,cy-x,rb);setP(cx-y,cy-x,rb);
        y++;if(err<0)err+=2*y+1;else{x--;err+=2*(y-x)+1;}
      }
      // spinning sectors
      this.angle+=active?0.12:0.03;
      for(let s=0;s<4;s++){
        const sa=this.angle+s*Math.PI/2;
        for(let i=10;i<r;i++){
          const sx=(Math.cos(sa)*i)|0,sy=(Math.sin(sa)*i)|0;
          setP(cx+sx,cy+sy,active?120:35);
        }
      }
      // center dot
      for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++)setP(cx+dx,cy+dy,active?200:50);
      // read/write indicator
      if(Math.sin(t*8)>0.5)drawText('R/W','monospace',7,ox+30,oy+72,active?160:40,30,9);
    }},

  // 10: POWER STATUS
  {title:'PWR',sub:'電源',
    draw(ox,oy,t,active){
      // big power icon
      const cx=ox+45,cy=oy+38;
      // circle
      const r=18;
      let x=r,y=0,err=1-r;
      const b=active?180:50;
      while(x>=y){
        // skip top center for gap
        if(!(y<6&&Math.abs(x)<4)){
          setP(cx+x,cy+y,b);setP(cx-x,cy+y,b);setP(cx+x,cy-y,b);setP(cx-x,cy-y,b);
        }
        setP(cx+y,cy+x,b);setP(cx-y,cy+x,b);
        if(!(x<6&&Math.abs(y)<4)){
          setP(cx+y,cy-x,b);setP(cx-y,cy-x,b);
        }
        y++;if(err<0)err+=2*y+1;else{x--;err+=2*(y-x)+1;}
      }
      // vertical line
      lineV(cx,cy-r-2,cy,b);lineV(cx+1,cy-r-2,cy,b);
      // status pulse
      const pulse=Math.sin(t*3)*0.5+0.5;
      const statusBrt=active?200:((pulse*60+20)|0);
      drawText(active?'ONLINE':'STANDBY','monospace',7,ox+14,oy+66,statusBrt,62,10);
      // bottom bar
      const barW=(pulse*60)|0;
      for(let i=0;i<barW;i++){
        setP(ox+15+i,oy+78,statusBrt*0.6|0);
        setP(ox+15+i,oy+79,statusBrt*0.3|0);
      }
    }},

  // 11: KANJI MATRIX
  {title:'行列',sub:'MATRIX',
    draw(ox,oy,t,active){
      const chars='01電脳空仮現実'.split('');
      for(let col=0;col<6;col++){
        const speed=0.8+col*0.3;
        const offset=(frame*speed*0.05+col*7)%12;
        for(let row=0;row<5;row++){
          const yp=oy+16+row*14-((offset*14)%14)|0;
          if(yp<oy+14||yp>oy+80)continue;
          const ci=(row+col+Math.floor(frame*speed*0.02))%chars.length;
          const dist=Math.abs(yp-(oy+48))/(BS/2);
          const fade=Math.max(0,1-dist*1.2);
          const brt=((active?160:40)*fade)|0;
          if(brt<3)continue;
          drawText(chars[ci],'serif',11,ox+8+col*13,yp,brt,13,13);
        }
      }
    }}
];

// tile state
const tileState=tiles.map((_,i)=>({
  idx:i,col:i%COLS,row:(i/COLS)|0,
  gx:STRIP+(i%COLS)*BS,gy:((i/COLS)|0)*BS,
  flash:0,active:false,scanY:0,scanning:false
}));

function render(){
  frame++;
  const t=frame*0.03;

  // clear
  for(let i=0;i<TW*TH*4;i+=4){d[i]=0;d[i+1]=0;d[i+2]=0;d[i+3]=255;}

  // ===== TILES =====
  tileState.forEach((ts,idx)=>{
    const ox=ts.gx,oy=ts.gy;
    ts.flash*=0.88;if(ts.flash<0.01)ts.flash=0;
    if(ts.scanning){ts.scanY+=4;if(ts.scanY>BS){ts.scanning=false;ts.scanY=0;}}

    const pulse=Math.sin(t+idx*0.5)*0.5+0.5;
    const bBrt=ts.active?60:(6+pulse*8|0);

    // border
    drawRect(ox,oy,BS,BS,bBrt);

    // corner marks
    const cm=ts.active?140:20;
    for(let i=0;i<6;i++){
      setP(ox+1+i,oy+1,cm);setP(ox+1,oy+1+i,cm);
      setP(ox+BS-2-i,oy+1,cm);setP(ox+BS-2,oy+1+i,cm);
      setP(ox+1+i,oy+BS-2,cm);setP(ox+1,oy+BS-2-i,cm);
      setP(ox+BS-2-i,oy+BS-2,cm);setP(ox+BS-2,oy+BS-2-i,cm);
    }

    // title bar area
    const tile=tiles[idx];
    drawText(tile.title,'monospace',7,ox+4,oy+3,ts.active?180:35,30,9);
    drawText(tile.sub,'serif',8,ox+56,oy+3,ts.active?120:18,30,9);
    lineH(ox+2,ox+BS-3,oy+13,ts.active?40:8);

    // tile content
    tile.draw(ox,oy,t,ts.active||ts.flash>0.1);

    // scan line
    if(ts.scanning){
      const sy=(oy+ts.scanY)|0;
      if(sy>0&&sy<TH){lineH(ox+1,ox+BS-2,sy,180);lineH(ox+1,ox+BS-2,sy+1,60);}
    }

    // flash
    if(ts.flash>0){
      const fb=(ts.flash*60)|0;
      for(let y=oy+1;y<oy+BS-1;y++)for(let x=ox+1;x<ox+BS-1;x++)setP(x,y,fb);
    }
  });

  // ===== RIPPLES =====
  for(let ri=ripples.length-1;ri>=0;ri--){
    const rp=ripples[ri];
    rp.radius+=5;
    if(rp.radius>rp.maxRadius){ripples.splice(ri,1);continue;}
    const r=rp.radius|0;
    const thick=Math.max(1,Math.min(3,5-(rp.radius/55|0)));
    const fade=Math.max(0,1-rp.radius/(rp.maxRadius*0.55));
    const brt=(255*fade)|0;
    if(brt<3)continue;
    const rI=Math.max(0,r-thick),r2=r*r,ri2=rI*rI,cx=rp.cx,cy=rp.cy;
    for(let y=Math.max(0,(cy-r)|0);y<=Math.min(TH-1,(cy+r)|0);y++){
      const dy=y-cy,dy2=dy*dy;if(dy2>r2)continue;
      const xO=Math.sqrt(r2-dy2),xI=dy2<ri2?Math.sqrt(ri2-dy2):0;
      for(let x=Math.max(0,(cx-xO)|0);x<=Math.min(TW-1,(cx-xI)|0);x++)setP(x,y,brt);
      for(let x=Math.max(0,(cx+xI)|0);x<=Math.min(TW-1,(cx+xO)|0);x++)setP(x,y,brt);
    }
    // echo ring
    if(rp.radius>16){
      const er=(rp.radius-14)|0,eb=(brt*0.2)|0;
      if(eb>2){
        let ex=er,ey=0,ee=1-er;
        while(ex>=ey){
          setP(cx+ex,cy+ey,eb);setP(cx-ex,cy+ey,eb);setP(cx+ex,cy-ey,eb);setP(cx-ex,cy-ey,eb);
          setP(cx+ey,cy+ex,eb);setP(cx-ey,cy+ex,eb);setP(cx+ey,cy-ex,eb);setP(cx-ey,cy-ex,eb);
          ey++;if(ee<0)ee+=2*ey+1;else{ex--;ee+=2*(ey-ex)+1;}
        }
      }
    }
  }

  // ===== LEFT STRIP - kanji scroll + bars =====
  lineV(STRIP-1,0,TH-1,15);
  for(let seg=0;seg<12;seg++){
    const sy=4+seg*22,sh=18;
    const level=Math.sin(t*1.8+seg*0.6)*0.5+0.5;
    const fillH=(level*sh)|0;
    const brt=(15+level*55)|0;
    for(let y=0;y<fillH;y++){
      const py=sy+sh-1-y;
      for(let x=4;x<STRIP-4;x++)if((x+py)%2===0)setP(x,py,brt);
    }
  }

  // ===== RIGHT STRIP - scrolling kanji =====
  const rsx=STRIP+COLS*BS;
  lineV(rsx,0,TH-1,15);
  scrollOff+=0.5;
  for(let i=0;i<16;i++){
    const yp=((i*20-(scrollOff%20)+TH)%TH)-20;
    if(yp<-20||yp>TH)continue;
    const ci=(i+Math.floor(scrollOff/20))%kanjiStream.length;
    const dist=Math.abs(yp+10-TH/2)/(TH/2);
    const fade=Math.max(0,1-dist*1.3);
    const brt=(fade*40+5)|0;
    drawText(kanjiStream[ci],'serif',14,rsx+4,yp|0,brt,28,18);
  }

  // active tile pips
  tileState.forEach(ts=>{
    if(ts.flash>0.05){
      const py=(ts.gy+BS/2)|0;
      const b=(ts.flash*200)|0;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){setP(rsx+5+dx,py+dy,b);setP(STRIP-6+dx,py+dy,b);}
    }
  });

  // ===== SCANLINES =====
  for(let y=0;y<TH;y+=3){
    for(let x=0;x<TW;x++){
      const pi=(y*TW+x)*4;
      d[pi]=Math.max(0,d[pi]-3);d[pi+1]=Math.max(0,d[pi+1]-3);d[pi+2]=Math.max(0,d[pi+2]-3);
    }
  }

  ctx.putImageData(img,0,0);
  requestAnimationFrame(render);
}

// ===== INPUT =====
function getPos(e){
  const rect=c.getBoundingClientRect();
  const sx=TW/rect.width,sy=TH/rect.height;
  const touches=e.touches||[{clientX:e.clientX,clientY:e.clientY}];
  return Array.from(touches).map(t=>({x:(t.clientX-rect.left)*sx,y:(t.clientY-rect.top)*sy}));
}

let lastR=0;
function onDown(e){
  e.preventDefault();
  const now=Date.now();
  getPos(e).forEach(p=>{
    if(now-lastR>40){ripples.push({cx:p.x,cy:p.y,radius:0,maxRadius:Math.max(TW,TH)*1.1});lastR=now;}
    tileState.forEach(ts=>{
      if(p.x>=ts.gx&&p.x<ts.gx+BS&&p.y>=ts.gy&&p.y<ts.gy+BS){
        ts.flash=1;ts.active=true;ts.scanning=true;ts.scanY=0;
      }
    });
  });
}
function onUp(){tileState.forEach(t=>t.active=false);}
function onMove(e){
  if(e.buttons||e.touches){
    e.preventDefault();
    const now=Date.now();
    getPos(e).forEach(p=>{
      if(now-lastR>60){ripples.push({cx:p.x,cy:p.y,radius:0,maxRadius:Math.max(TW,TH)*0.8});lastR=now;}
    });
  }
}

c.addEventListener('mousedown',onDown);
c.addEventListener('mouseup',onUp);
c.addEventListener('mouseleave',onUp);
c.addEventListener('mousemove',onMove);
c.addEventListener('touchstart',onDown,{passive:false});
c.addEventListener('touchend',onUp,{passive:false});
c.addEventListener('touchmove',onMove,{passive:false});

render();
</script>
</body>
